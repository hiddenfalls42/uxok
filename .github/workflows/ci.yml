name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

# Least privilege by default; widen per-job only where required.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      # Curated rule set, zero violations enforced (CLAUDE.md / decision #13).
      - name: Ruff check
        run: ruff check src tests examples

  format:
    name: Format check
    runs-on: ubuntu-latest
    # Blocking: the one-shot format sweep landed, so the tree is fully formatted
    # and `ruff format --check` must stay clean (ruff floor pinned in pyproject.toml).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff format check
        run: ruff format --check src tests examples

  types:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src

  docstrings:
    name: Docstring quality (non-blocking)
    runs-on: ubuntu-latest
    # interrogate gates public-surface docstring COVERAGE; pydoclint checks each
    # docstring MATCHES its signature (arg names/types, returns, raises) — the
    # param drift the docs auditor otherwise catches by hand. The reference site
    # is only as good as these docstrings, so this guards it mechanically.
    # Non-blocking until the baseline is measured and interrogate's fail-under is
    # calibrated in pyproject ([tool.interrogate]).
    # TODO: set fail-under to the measured baseline and flip to blocking
    # (remove continue-on-error) once the surface is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Interrogate (docstring coverage)
        run: interrogate -c pyproject.toml src/uxok
      - name: Pydoclint (docstring vs signature)
        run: pydoclint src/uxok

  test:
    name: Test & coverage (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      # Verbatim coverage command from CLAUDE.md. COVERAGE_RUN=1 disables
      # Hypothesis deadlines (instrumentation slows the tick system); sysmon is
      # the fast 3.12+ monitoring backend. Property tests under tests/properties/
      # run as part of this command.
      - name: Pytest with branch coverage gate
        env:
          COVERAGE_RUN: "1"
          COVERAGE_CORE: sysmon
        run: pytest tests/ --cov=src/uxok --cov-branch --cov-fail-under=91.5

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Static security scan (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking until the baseline is triaged; flip to a hard gate later.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Bandit
        run: bandit -r src
      # pip-audit replaces the deprecated `safety check` (which now requires an
      # account/auth). Audits the installed dependency set for known CVEs.
      - name: pip-audit
        run: pip-audit

  perf:
    name: Performance benchmarks (non-blocking)
    runs-on: ubuntu-latest
    # Explicit and visible rather than silently deselected. Candidate to move to
    # a nightly schedule later.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Pytest performance markers
        run: pytest -m performance

  api-coupling:
    name: API/CHANGELOG coupling (non-blocking)
    runs-on: ubuntu-latest
    # Pre-1.0 policy: breaking changes must update CHANGELOG.md and API.md in the
    # same commit. Non-blocking while API.md is actively churning.
    # TODO: flip to blocking (remove continue-on-error) once API.md settles.
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Check coupling over PR range
        run: |
          python scripts/check_api_changelog_coupling.py \
            --range "origin/${{ github.base_ref }}...HEAD"
