name: CodeQL

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]
  schedule:
    # Weekly, Monday 03:00 UTC.
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      # codeql-action/analyze calls GET .../actions/runs/{run_id} to resolve run
      # metadata; without this the upload step 403s with "Resource not
      # accessible by integration" even though contents/security-events are set.
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python
          build-mode: none
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:python"
