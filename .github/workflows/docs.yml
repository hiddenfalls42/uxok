name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Least privilege by default; the deploy job widens to exactly what Pages needs.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (strict)
    runs-on: ubuntu-latest
    env:
      DISABLE_MKDOCS_2_WARNING: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install docs dependencies
        run: pip install -e ".[docs]"

      # --strict turns broken links, missing nav entries, and mkdocstrings
      # resolution failures into build failures. With the validation: block in
      # mkdocs.yml, this is the real merge gate.
      - name: Build site (strict)
        run: mkdocs build --strict

      # Upload the built site as the Pages artifact so the deploy job can publish
      # it. Harmless on PRs (uploaded, not deployed).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    # Ready but dormant. Fires only on push to main, and only succeeds once the
    # repo is public AND Settings -> Pages -> Source is set to "GitHub Actions".
    # Until then it is skipped on every PR and is the only thing that needs to
    # flip for publishing to go live instantly — no other change required.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
