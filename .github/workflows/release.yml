# Release pipeline — build, verify, and publish uxok, TestPyPI first.
#
# Two entry points:
#   * push a `v*` tag  -> build -> TestPyPI -> PyPI (a full release; PyPI only
#     runs behind a green TestPyPI publish).
#   * run manually      -> build -> TestPyPI (a dry run that exercises the
#     TestPyPI path without ever touching real PyPI).
#
# Trusted Publishing (OIDC): this workflow uses NO API tokens or secrets. Before
# the FIRST run, BOTH trusted publishers must be registered — a package cannot
# publish until its publisher exists:
#   * TestPyPI: https://test.pypi.org -> the uxok project -> Publishing -> add a
#     GitHub publisher: owner `hiddenfalls42`, repo `uxok`, workflow
#     `release.yml`, environment `testpypi`.
#   * PyPI:     https://pypi.org      -> the uxok project -> Publishing -> add a
#     GitHub publisher: owner `hiddenfalls42`, repo `uxok`, workflow
#     `release.yml`, environment `pypi`.
# The environment name in each PyPI publisher MUST match the `environment:` of
# the corresponding job below, or OIDC authentication fails.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege by default; the publish jobs widen id-token for OIDC.
permissions:
  contents: read

jobs:
  build:
    name: Build and check distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Twine check
        run: twine check dist/*
      # Tag/version consistency gate: on a tag push, the pushed tag (minus
      # leading `v`) MUST equal project.version in pyproject.toml, or the
      # release aborts loudly. Skipped for manual (workflow_dispatch) dry runs,
      # which carry no tag.
      - name: Assert tag matches project.version
        if: github.ref_type == 'tag'
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          tag_version="${GIT_TAG#v}"
          proj_version="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=${tag_version} pyproject=${proj_version}"
          if [ "${tag_version}" != "${proj_version}" ]; then
            echo "::error::pushed tag v${tag_version} does not match project.version ${proj_version}"
            exit 1
          fi
      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write # OIDC token for TestPyPI Trusted Publishing (no secrets)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI is a dry-run target; a version already uploaded there
          # (e.g. from a manual dry run before the real tag) must not fail
          # this job and block the downstream PyPI publish.
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    # Only a real tagged release reaches PyPI; manual dry runs stop at TestPyPI.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # OIDC token for PyPI Trusted Publishing (no secrets)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
