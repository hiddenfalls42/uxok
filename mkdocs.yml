site_name: uxok
site_description: A hot-loading plugin microkernel for Python
site_url: https://hiddenfalls42.github.io/uxok
repo_url: https://github.com/hiddenfalls42/uxok
repo_name: hiddenfalls42/uxok

docs_dir: docs
site_dir: site

exclude_docs: |
  agent_data/
  scratchboard/
  manifests/
  proposals/

# Make link and nav problems hard errors (amplified further by `--strict`).
# `anchors: info` keeps mkdocstrings cross-reference anchors from tripping the
# gate on benign cases; broken targets and stray nav files still fail.
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn        # the real gate: links to pages that don't exist
    anchors: info
    absolute_links: warn
    # mkdocs' own default is `info`. Held there (not `warn`) because the
    # generated reference/ nested literate-nav uses a trailing-slash directory
    # link, which this check flags as "unrecognized". `not_found` still catches
    # genuinely broken targets.
    unrecognized_links: info

# DOCS-CHANGELOG.md is a meta log, deliberately outside the reader-facing nav.
# (top-level option, gitignore-style patterns relative to the docs dir)
not_in_nav: |
  DOCS-CHANGELOG.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: list
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            filters: ["!^_"]
            inherited_members: true
            summary: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# No `nav:` block by design. The whole-site navigation is generated by
# scripts/gen_ref_pages.py into SUMMARY.md and read by literate-nav: authored
# pages are discovered from the filesystem and titled from their H1, the API
# reference is generated from source. Add a Markdown file with an H1 and it
# appears in the nav — there is nothing to hand-edit here.
