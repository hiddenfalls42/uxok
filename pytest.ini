[pytest]
testpaths = tests
markers =
    integration: integration workflow tests
    performance: performance benchmarks (slow)
    concurrency: concurrent operation tests
    chaos: chaos engineering tests
    property_test: property-based tests
    isolated: tests requiring complete isolation
    live: tests that require live external services (deselected by default)

# Don't run performance tests by default.
# *_standalone.py files are `python3 <script>` demos, not pytest tests.
addopts = -m "not performance and not live" --ignore-glob=*_standalone.py